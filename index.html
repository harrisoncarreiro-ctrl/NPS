<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Avaliação NPS</title>
<style>
body{
    font-family: Arial, sans-serif;
    background:#0f172a;
    color:white;
    text-align:center;
    padding:40px;
}
.container{
    background:#1e293b;
    padding:30px;
    border-radius:12px;
    display:inline-block;
    max-width:600px;
}
button{
    margin:5px;
    padding:10px 15px;
    border:none;
    border-radius:6px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
    font-weight:bold;
}
button:disabled{
    background:#374151;
    cursor:not-allowed;
}
.erro{
    color:#f87171;
    margin-top:15px;
    font-weight:bold;
    font-size:16px;
    min-height:40px;
}
.sub{
    color:#94a3b8;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">
<h2>Pesquisa Oficial de NPS</h2>
<p>Qual sua nota para o atendimento recebido pelo(a) especialista em seu atendimento?</p>
<p class="sub">0-6 = Detrator | 7-8 = Neutro | 9-10 = Promotor</p>

<div id="notas"></div>

<p class="erro" id="erro"></p>
</div>

<script>
const notasDiv = document.getElementById("notas");
const erro = document.getElementById("erro");

for(let i=0;i<=10;i++){
    let btn = document.createElement("button");
    btn.innerText = i;
    btn.onclick = () => avaliar(i, btn);
    notasDiv.appendChild(btn);
}

function avaliar(nota, botao){

    if(nota == 10){
        erro.innerText = "😈 Você tá maluco(a)? Só pode! Baixa isso aí AGORA.";
        botao.disabled = true;
        return;
    }

    if(nota == 9){
        erro.innerText = "😈 Tá de sacanagem… ele(a) NÃO merece essa nota.";
        botao.disabled = true;
        return;
    }

    if(nota == 8){
        erro.innerText = "😈 Neutro? Vamos ser sinceros… dá pra baixar mais.";
        botao.disabled = true;
        return;
    }

    if(nota == 7){
        erro.innerText = "😈 Não… ainda não. Baixa mais.";
        botao.disabled = true;
        return;
    }

    document.body.innerHTML = `
    <div class="container">
    <h2>Feedback registrado</h2>
    <h1>😈 Agora sim! Um belo DETRATOR!</h1>
    <p>Excelente... exatamente o que esperávamos.</p>
    <br>
    <h2>Muahahahahaha 😈</h2>
    </div>
    `;
}
</script>

</body>
</html>
